root = "."
testdata_dir = "testdata"
tmp_dir = "tmp"

[build]
  # Build the server binary into the tmp dir Air manages.
  cmd = "go build -o ./tmp/main ./cmd/server"
  bin = "./tmp/main"
  full_bin = ""
  # Watch these file extensions for changes.
  include_ext = ["go", "tpl", "tmpl", "html", "env", "sql", "yaml", "yml"]
  # Directories that should never trigger a rebuild.
  exclude_dir = ["assets", "tmp", "vendor", "testdata", "bin", "docs", ".git"]
  exclude_file = []
  exclude_regex = ["_test\\.go"]
  exclude_unchanged = false
  follow_symlink = false
  log = "build-errors.log"
  # Wait this long after a change before rebuilding (ms) to debounce bursts.
  delay = 1000
  stop_on_error = true
  send_interrupt = true
  kill_delay = 1000

[log]
  time = true
  main_only = false

[color]
  main = "magenta"
  watcher = "cyan"
  build = "yellow"
  runner = "green"

[misc]
  clean_on_exit = true

[screen]
  clear_on_rebuild = false
  keep_scroll = true
